services:
  db:
    image: postgres:16-alpine
    container_name: progress-tracker-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=yourpassword
      - POSTGRES_DB=progress_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/student-schema.sql:/docker-entrypoint-initdb.d/01-student-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  instructor-backend:
    build:
      context: ./instructor-backend
    container_name: instructor-backend
    ports:
      - "5001:5000"
    env_file:
      - .env
    volumes:
      - ./instructor-backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: