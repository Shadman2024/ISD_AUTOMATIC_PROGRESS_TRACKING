services:
  db:
    image: postgres:16-alpine
    container_name: progress-tracker-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=progress_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/student-schema.sql:/docker-entrypoint-initdb.d/01-student-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  student-backend:
    build:
      context: ./student-backend
    container_name: student-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  instructor-backend:
    build:
      context: ./instructor-backend
    container_name: instructor-backend
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - student-backend
      - instructor-backend

volumes:
  postgres_data: